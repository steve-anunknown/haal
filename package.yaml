name:                haal
version:             0.4.0.2
github:              "steve-anunknown/haal"
license:             BSD-3-Clause
author:              "Stefanos Anagnostou"
maintainer:          "steve.anunknown@gmail.com"
copyright:           "2025 Stefanos Anagnostou"

extra-source-files:
- README.md 
extra-doc-files:
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/steve-anunknown/haal#readme>
synopsis:            "A Haskell library for Active Automata Learning."
category:            "Model Learning"

flags:
  liquid:
    description: Enable LiquidHaskell verification
    manual: true
    default: false

dependencies:
- base >= 4.18.3 && < 5

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
    - Haal.Automaton.DFA
    - Haal.Automaton.MealyAutomaton
    - Haal.Automaton.MooreAutomaton
    - Haal.BlackBox
    - Haal.Dot
    - Haal.EquivalenceOracle.CombinedOracle
    - Haal.EquivalenceOracle.RandomWalk
    - Haal.EquivalenceOracle.RandomWords
    - Haal.EquivalenceOracle.WMethod
    - Haal.EquivalenceOracle.WpMethod
    - Haal.Experiment
    - Haal.Learning.LMstar
  dependencies:
    - containers >= 0.6.7 && < 0.8
    - mtl >= 2.3.1 && < 2.4
    - random >= 1.3.1 && < 1.4
    - vector >= 0.13.2 && < 0.14
  when:
    - condition: flag(liquid)
      dependencies:
        - liquidhaskell
      cpp-options: -DLIQUID

tests:
  haal-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - haal
    - hspec
    - containers
    - QuickCheck
    - mtl
    - random 



executables:
  div:
    main: div.hs 
    source-dirs: examples
    dependencies: 
    - haal 
    - base
    - mtl 
  demo: 
    main: demo.hs 
    source-dirs: examples
    dependencies: 
    - haal 
    - base
    - containers 
  io:
    main: io.hs 
    source-dirs: examples
    dependencies: 
    - haal 
    - base
    - process >= 1.6.19 && < 1.7
    - mtl
  website:
    main: website.hs
    source-dirs: examples
    dependencies:
    - haal
    - base
    - process >= 1.6.19 && < 1.7
